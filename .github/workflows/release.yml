name: Release

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build wheels on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12', '3.13', '3.14']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.0
          run-install: false
          
      - name: Install Stable Mojo
        run: |
          pixi global install mojo==1.0.0b2 -c https://conda.modular.com/max -c conda-forge
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel build

      - name: Run Tests
        run: |
          for f in tests/test_*.mojo; do
            echo ">>> Running $f"
            mojo build -debug-level=line-tables -I . "$f" -o test_bin
            ./test_bin || exit 1
          done
          
      - name: Build Python Wheel
        working-directory: python
        run: |
          python setup.py bdist_wheel
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mojovec-wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/dist/*.whl

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: mojovec-wheel-*
          merge-multiple: true

      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
